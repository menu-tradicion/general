<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Braza Brava POS</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<header>

<h1>BRAZA BRAVA POS</h1>

</header>

<nav>

<button onclick="mostrar('dashboard')">Dashboard</button>
<button onclick="mostrar('mesas')">Mesas</button>
<button onclick="mostrar('mostrador')">Mostrador</button>
<button onclick="mostrar('domicilios')">Domicilios</button>
<button onclick="mostrar('inventario')">Inventario</button>
<button onclick="mostrar('caja')">Caja</button>

</nav>

<section id="dashboard">

<h2>Ventas del día</h2>

<div id="ventasHoy">$0</div>

<canvas id="grafico"></canvas>

</section>

<section id="mesas" class="hidden">

<h2>Mesas</h2>

<div id="listaMesas"></div>

</section>

<section id="mostrador" class="hidden">

<h2>Pedido Mostrador</h2>

<select id="producto"></select>

<input type="number" id="cantidad" value="1">

<button onclick="agregarPedido()">Agregar</button>

<div id="pedidoActual"></div>

<h3>Total $<span id="totalPedido">0</span></h3>

<button onclick="finalizarPedido()">Cobrar</button>

</section>

<section id="domicilios" class="hidden">

<h2>Domicilio</h2>

<input placeholder="Nombre cliente" id="cliente">

<input placeholder="Dirección" id="direccion">

<select id="productoD"></select>

<input type="number" id="cantidadD" value="1">

<button onclick="agregarPedidoD()">Agregar</button>

<div id="pedidoD"></div>

</section>

<section id="inventario" class="hidden">

<h2>Inventario</h2>

<div id="listaInventario"></div>

</section>

<section id="caja" class="hidden">

<h2>Caja del día</h2>

<div id="resumenCaja"></div>

</section>

<script src="data.js"></script>
<script src="app.js"></script>

</body>

</html>
